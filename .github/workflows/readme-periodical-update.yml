name: periodical update README

on:
  # GitHub Actions cron schedules use UTC.
  # 30 15 * * * runs at 00:30 JST on the following calendar day.
  # Scheduled runs use the default branch; workflow_dispatch can be run manually.
  schedule:
    - cron: "30 15 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    name: Update README
    runs-on: ubuntu-latest
    # cf. https://docs.github.com/en/actions/reference/workflow-syntax-for-github-actions#jobsjob_idstepstimeout-minutes
    timeout-minutes: 5 # job 全体を完了するまでの制限時間

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate README
        run: npm run generate
      - name: Commit and push changes
        shell: bash
        run: |
          if git diff --quiet README.md; then
            echo "No README changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update README"
          git push
