name: periodical update README

on:
  # GitHub Actions cron schedules use UTC.
  # 30 15 * * * runs at 00:30 JST on the following calendar day.
  # Scheduled runs use the default branch; workflow_dispatch can be run manually.
  schedule:
    - cron: "30 15 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    name: Update README
    runs-on: ubuntu-latest
    # cf. https://docs.github.com/en/actions/reference/workflow-syntax-for-github-actions#jobsjob_idstepstimeout-minutes
    timeout-minutes: 5 # job 全体を完了するまでの制限時間

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Refresh Instagram Token
        id: refresh-instagram-token
        run: node auto-readme-generate/refresh-token.js
        env:
          META_APP_ID: ${{ secrets.META_APP_ID }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
      - name: Update GitHub Secret
        run: gh secret set INSTAGRAM_ACCESS_TOKEN --body "${{ steps.refresh-instagram-token.outputs.new_token }}"
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
      - name: Generate README
        run: npm run generate
        env:
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ steps.refresh-instagram-token.outputs.new_token }}
      - name: Commit and push changes
        shell: bash
        run: |
          if git diff --quiet README.md; then
            echo "No README changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update README"
          git push
